<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 240" width="280" height="240">
  <defs>
    <linearGradient id="chocMain" x1="0" y1="0" x2=".8" y2="1">
      <stop offset="0%" stop-color="#7B4230" />
      <stop offset="35%" stop-color="#5E2E1E" />
      <stop offset="70%" stop-color="#4A2115" />
      <stop offset="100%" stop-color="#3D1A10" />
    </linearGradient>
    <radialGradient id="chocHi" cx=".3" cy=".25" r=".7">
      <stop offset="0%" stop-color="#9B6248" stop-opacity=".4" />
      <stop offset="100%" stop-color="#4A2115" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="pistaBase" cx=".45" cy=".45" r=".55">
      <stop offset="0%" stop-color="#C8DC6A" />
      <stop offset="50%" stop-color="#B0CC50" />
      <stop offset="100%" stop-color="#8EB035" />
    </radialGradient>
    <radialGradient id="pistaShine" cx=".35" cy=".3" r=".5">
      <stop offset="0%" stop-color="#D8EC90" stop-opacity=".6" />
      <stop offset="100%" stop-color="#B0CC50" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="chocRing" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6B3825" />
      <stop offset="100%" stop-color="#4A2115" />
    </linearGradient>
  </defs>

  <g transform="translate(140,125)">
    <!-- Shadow -->
    <ellipse cx="5" cy="85" rx="110" ry="18" fill="#000" opacity=".08" />

    <!-- Chocolate outer shell -->
    <path d="M-105,0 C-105,-68 -70,-90 0,-90 C70,-90 115,-68 115,-5 C115,55 80,85 5,85 C-65,85 -105,60 -105,0Z"
      fill="url(#chocMain)" />
    <path d="M-105,0 C-105,-68 -70,-90 0,-90 C70,-90 115,-68 115,-5 C115,55 80,85 5,85 C-65,85 -105,60 -105,0Z"
      fill="url(#chocHi)" />

    <!-- Dark chocolate border ring -->
    <path d="M-88,-5 C-88,-60 -58,-78 5,-78 C55,-78 85,-55 90,-5 C92,40 68,72 8,72 C-50,72 -88,48 -88,-5Z"
      fill="url(#chocRing)" />

    <!-- Pistachio cream fill -->
    <path d="M-78,-2 C-78,-52 -50,-68 5,-68 C48,-68 75,-48 78,-2 C80,35 60,62 8,62 C-42,62 -78,40 -78,-2Z"
      fill="url(#pistaBase)" />
    <path d="M-78,-2 C-78,-52 -50,-68 5,-68 C48,-68 75,-48 78,-2 C80,35 60,62 8,62 C-42,62 -78,40 -78,-2Z"
      fill="url(#pistaShine)" />

    <!-- Cream texture bumps -->
    <ellipse cx="-30" cy="-30" rx="18" ry="12" fill="#C8E068" opacity=".4" />
    <ellipse cx="25" cy="-20" rx="15" ry="10" fill="#D0E880" opacity=".35" />
    <ellipse cx="-10" cy="20" rx="20" ry="11" fill="#C0D858" opacity=".3" />
    <ellipse cx="40" cy="15" rx="14" ry="9" fill="#C8E068" opacity=".3" />
    <ellipse cx="-45" cy="5" rx="12" ry="8" fill="#D0E880" opacity=".25" />
    <ellipse cx="10" cy="-45" rx="16" ry="8" fill="#C8E068" opacity=".3" />

    <!-- Kadaif pieces scattered throughout -->
    <!-- Top -->
    <rect x="-35" y="-55" width="14" height="4.5" rx="2" fill="#D4A428" transform="rotate(-25 -28 -53)" opacity=".85" />
    <rect x="-12" y="-50" width="12" height="4" rx="2" fill="#E0B83A" transform="rotate(15 -6 -48)" opacity=".9" />
    <rect x="15" y="-55" width="15" height="4.5" rx="2" fill="#C89820" transform="rotate(-10 22 -53)" opacity=".85" />
    <rect x="38" y="-48" width="11" height="4" rx="2" fill="#D4A428" transform="rotate(30 43 -46)" opacity=".8" />
    <rect x="-55" y="-42" width="13" height="4" rx="2" fill="#E0B83A" transform="rotate(-15 -48 -40)" opacity=".85" />
    <rect x="5" y="-58" width="10" height="3.5" rx="1.7" fill="#C89820" transform="rotate(40 10 -56)" opacity=".75" />
    <rect x="55" y="-38" width="11" height="3.5" rx="1.7" fill="#D4A428" transform="rotate(-20 60 -36)" opacity=".8" />

    <!-- Middle -->
    <rect x="-60" y="-18" width="14" height="4.5" rx="2" fill="#D4A428" transform="rotate(20 -53 -16)" opacity=".85" />
    <rect x="-35" y="-12" width="12" height="4" rx="2" fill="#C89820" transform="rotate(-30 -29 -10)" opacity=".9" />
    <rect x="-10" y="-20" width="15" height="4.5" rx="2" fill="#E0B83A" transform="rotate(10 -2 -18)" opacity=".85" />
    <rect x="20" y="-15" width="13" height="4" rx="2" fill="#D4A428" transform="rotate(-40 26 -13)" opacity=".8" />
    <rect x="45" y="-22" width="11" height="4" rx="2" fill="#C89820" transform="rotate(25 50 -20)" opacity=".85" />
    <rect x="60" y="-8" width="10" height="3.5" rx="1.7" fill="#E0B83A" transform="rotate(-15 65 -6)" opacity=".75" />
    <rect x="-65" y="5" width="12" height="4" rx="2" fill="#D4A428" transform="rotate(35 -59 7)" opacity=".8" />
    <rect x="-40" y="8" width="14" height="4.5" rx="2" fill="#E0B83A" transform="rotate(-10 -33 10)" opacity=".85" />
    <rect x="-12" y="2" width="11" height="4" rx="2" fill="#C89820" transform="rotate(45 -6 4)" opacity=".8" />
    <rect x="15" y="5" width="13" height="4" rx="2" fill="#D4A428" transform="rotate(-25 21 7)" opacity=".9" />
    <rect x="40" y="0" width="12" height="4" rx="2" fill="#E0B83A" transform="rotate(15 46 2)" opacity=".85" />
    <rect x="58" y="12" width="10" height="3.5" rx="1.7" fill="#C89820" transform="rotate(-35 63 14)" opacity=".75" />

    <!-- Bottom -->
    <rect x="-55" y="22" width="13" height="4" rx="2" fill="#D4A428" transform="rotate(10 -48 24)" opacity=".85" />
    <rect x="-30" y="28" width="15" height="4.5" rx="2" fill="#C89820" transform="rotate(-20 -22 30)" opacity=".8" />
    <rect x="-5" y="22" width="12" height="4" rx="2" fill="#E0B83A" transform="rotate(30 1 24)" opacity=".85" />
    <rect x="22" y="25" width="14" height="4.5" rx="2" fill="#D4A428" transform="rotate(-15 29 27)" opacity=".9" />
    <rect x="48" y="20" width="11" height="4" rx="2" fill="#C89820" transform="rotate(40 53 22)" opacity=".8" />
    <rect x="-45" y="40" width="12" height="4" rx="2" fill="#E0B83A" transform="rotate(-25 -39 42)" opacity=".8" />
    <rect x="-18" y="42" width="14" height="4.5" rx="2" fill="#D4A428" transform="rotate(20 -11 44)" opacity=".75" />
    <rect x="10" y="38" width="11" height="4" rx="2" fill="#C89820" transform="rotate(-35 15 40)" opacity=".8" />
    <rect x="35" y="35" width="13" height="4" rx="2" fill="#E0B83A" transform="rotate(5 41 37)" opacity=".75" />
    <rect x="-30" y="52" width="11" height="3.5" rx="1.7" fill="#D4A428" transform="rotate(15 -24 54)" opacity=".7" />
    <rect x="0" y="50" width="12" height="4" rx="2" fill="#C89820" transform="rotate(-10 6 52)" opacity=".7" />
    <rect x="25" y="48" width="10" height="3.5" rx="1.7" fill="#E0B83A" transform="rotate(25 30 50)" opacity=".65" />

    <!-- Extra bits -->
    <rect x="-48" y="-30" width="9" height="3" rx="1.5" fill="#D4A428" transform="rotate(50 -43 -28)" opacity=".7" />
    <rect x="30" y="-40" width="10" height="3.5" rx="1.7" fill="#E0B83A" transform="rotate(-45 35 -38)" opacity=".75" />
    <rect x="-20" y="-35" width="11" height="3.5" rx="1.7" fill="#C89820" transform="rotate(5 -14 -33)" opacity=".8" />
    <rect x="50" y="35" width="9" height="3" rx="1.5" fill="#D4A428" transform="rotate(-50 54 37)" opacity=".6" />

    <!-- Shell edge highlight -->
    <path d="M-100,-10 C-100,-65 -65,-85 0,-85" stroke="#8B5840" stroke-width="2" fill="none" opacity=".3" />
    <!-- Bottom shadow -->
    <path d="M-80,55 C-50,75 10,80 50,70 C75,60 90,40 95,15" stroke="#2A1008" stroke-width="2" fill="none"
      opacity=".15" />
  </g>
</svg>